<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Hasil TKA 2026 - MTsS Al-Mukhtariyah Mande</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #333;
        }
        /* Header Madrasah Berwarna Hijau Islami Modern */
        .header-section {
            background: linear-gradient(135deg, #114216 0%, #1b5e20 100%);
            color: #ffffff;
            padding: 40px 20px;
            border-bottom: 5px solid #d4af37; /* Aksen Emas */
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo-madrasah {
            max-height: 90px;
            margin-bottom: 15px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2));
        }
        /* Kotak Pencarian */
        .search-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: -30px;
            background: #ffffff;
        }
        .form-control-lg {
            border-radius: 10px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
        }
        .form-control-lg:focus {
            border-color: #1b5e20;
            box-shadow: 0 0 0 0.25rem rgba(27, 94, 32, 0.25);
        }
        .btn-search {
            background-color: #1b5e20;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-search:hover {
            background-color: #114216;
            color: white;
            transform: translateY(-1px);
        }
        /* Kartu Hasil Nilai Siswa */
        .student-card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .student-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #edf2f7;
            padding: 20px;
        }
        /* Desain Angka Nilai */
        .score-box {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e5e7eb;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            height: 100%;
        }
        .score-number {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            color: #111827;
        }
        /* Badge Kategori Kustom */
        .badge-custom {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-kurang { background-color: #fef2f2; color: #dc3545; border: 1px solid #fca5a5; }
        .badge-memadai { background-color: #eff6ff; color: #0d6efd; border: 1px solid #93c5fd; }
        .badge-baik { background-color: #f0fdf4; color: #198754; border: 1px solid #86efac; }
        .badge-kosong { background-color: #f9fafb; color: #6c757d; border: 1px solid #d1d5db; }
    </style>
</head>
<body>

    <div class="header-section text-center">
        <div class="container">
            <img src="logo.png" alt="Logo Madrasah" class="logo-madrasah">
            
            <h2 class="fw-bold m-0 text-uppercase" style="letter-spacing: 0.5px; font-size: 1.5rem;">Hasil Tes Kemampuan Akademik (TKA)</h2>
            <h3 class="fw-semibold my-2" style="color: #d4af37; font-size: 1.25rem;">MTsS AL-MUKHTARIYAH MANDE</h3>
            <p class="m-0 opacity-75 small fw-light">Tahun Pelajaran 2026/2027 • Kab. Bandung Barat</p>
        </div>
    </div>

    <div class="container py-3">
        <div class="card search-card mx-auto p-4 mb-5" style="max-width: 500px;">
            <h5 class="mb-3 fw-bold text-center" style="color: #1b5e20;">Pencarian Data Siswa</h5>
            <div class="mb-3">
                <label for="searchKey" class="form-label text-muted small fw-medium">Masukkan Nama Lengkap Siswa atau NISN:</label>
                <input type="text" id="searchKey" class="form-control form-control-lg" placeholder="Contoh: MUHAMMAD TAUFAN atau 3103416983" onkeyup="if(event.key === 'Enter') cariNilai()">
            </div>
            <button onclick="cariNilai()" class="btn btn-search btn-lg w-100 py-2.5">Cari Hasil Ujian</button>
        </div>

        <div id="hasilPencarian" class="mx-auto" style="max-width: 550px;"></div>
    </div>

    <script>
        // ISI DENGAN LINK URL CSV ANDA SEPERTI SEBELUMNYA
        const urlSpreadsheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmnuI1awqbz55VpuoKDzmdtoL7AZTK8KbMaZKOkVl-YRnUo4_koR46sWWQy9FQarHwVo2deG4FLdAV/pub?gid=2009898041&single=true&output=csv"; 

        async function cariNilai() {
            const input = document.getElementById('searchKey').value.toUpperCase().trim();
            const hasilDiv = document.getElementById('hasilPencarian');
            
            if(!input) {
                hasilDiv.innerHTML = `<div class="alert alert-warning text-center border-0 shadow-sm" style="border-radius: 12px;">Silakan masukkan Nama atau NISN anak terlebih dahulu.</div>`;
                return;
            }

            hasilDiv.innerHTML = `
                <div class="text-center my-5">
                    <div class="spinner-border text-success" role="status" style="width: 2.5rem; height: 2.5rem;"></div>
                    <p class="mt-3 text-muted small">Memuat lembar hasil ujian siswa...</p>
                </div>`;

            try {
                const response = await fetch(urlSpreadsheet);
                const dataText = await response.text();
                const baris = parseCSV(dataText);
                
                const siswaDitemukan = baris.filter(b => 
                    (b[3] && b[3].toUpperCase().includes(input)) || 
                    (b[2] && b[2].includes(input))
                );

                if(siswaDitemukan.length === 0) {
                    hasilDiv.innerHTML = `<div class="alert alert-danger text-center border-0 shadow-sm" style="border-radius: 12px;">Data tidak ditemukan. Mohon periksa kembali penulisan nama atau NISN siswa.</div>`;
                    return;
                }

                let htmlHasil = '';
                siswaDitemukan.forEach(siswa => {
                    const kelasBadgeMtk = getBadgeClass(siswa[7]);
                    const kelasBadgeBi = getBadgeClass(siswa[9]);

                    htmlHasil += `
                    <div class="card student-card mb-4 animate-fade-in">
                        <div class="student-header d-flex justify-content-between align-items-start">
                            <div>
                                <span class="badge bg-success mb-2 px-2.5 py-1.5" style="font-size: 0.7rem; background-color: #1b5e20 !important;">No. Urut: ${siswa[0]}</span>
                                <h4 class="fw-bold text-dark m-0" style="font-size: 1.25rem;">${siswa[3]}</h4>
                                <p class="text-muted small m-0 mt-1">NISN: <span class="fw-semibold">${siswa[2]}</span> • No. Peserta: <span class="fw-semibold">${siswa[1]}</span></p>
                            </div>
                        </div>
                        
                        <div class="card-body p-4">
                            <div class="row g-2 mb-4 bg-light p-3 rounded-3 text-muted small">
                                <div class="col-5 fw-medium">Tempat Lahir</div>
                                <div class="col-7">: ${siswa[4]}</div>
                                <div class="col-5 fw-medium">Tanggal Lahir</div>
                                <div class="col-7">: ${siswa[5]}</div>
                            </div>
                            
                            <div class="row g-3">
                                <div class="col-6">
                                    <div class="score-box">
                                        <div class="small fw-semibold text-muted text-uppercase mb-2" style="font-size: 0.75rem; letter-spacing: 0.5px;">Matematika</div>
                                        <div class="score-number">${siswa[6]}</div>
                                        <span class="badge-custom ${kelasBadgeMtk}">${siswa[7] || 'Kosong'}</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="score-box">
                                        <div class="small fw-semibold text-muted text-uppercase mb-2" style="font-size: 0.75rem; letter-spacing: 0.5px;">B. Indonesia</div>
                                        <div class="score-number">${siswa[8]}</div>
                                        <span class="badge-custom ${kelasBadgeBi}">${siswa[9] || 'Kosong'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
                
                hasilDiv.innerHTML = htmlHasil;

            } catch (error) {
                console.error(error);
                hasilDiv.innerHTML = `<div class="alert alert-danger text-center border-0 shadow-sm" style="border-radius: 12px;">Gagal mengambil data. Pastikan koneksi internet stabil atau hubungi Admin IT Sekolah.</div>`;
            }
        }

        function getBadgeClass(kategori) {
            if (!kategori) return 'badge-kosong';
            const kat = kategori.trim().toLowerCase();
            if (kat.includes('baik')) return 'badge-baik';
            if (kat.includes('memadai')) return 'badge-memadai';
            if (kat.includes('kurang')) return 'badge-kurang';
            return 'badge-kosong';
        }

        function parseCSV(text) {
            let p = [[]], l = 0, r = 0, q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i], next = text[i+1];
                if (c == '"') { q = !q; }
                else if (c == ',' && !q) { c = p[l][r++]; p[l][r] = ''; }
                else if (c == '\n' && !q) { 
                    if (next == '\r') { i++; } 
                    row = p[l][r]; r = 0; p[++l] = []; 
                }
                else if (c == '\r' && !q) { row = p[l][r]; r = 0; p[++l] = []; }
                else { p[l][r] = (p[l][r] || '') + c; }
            }
            return p;
        }
    </script>
</body>
</html>
